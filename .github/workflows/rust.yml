name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Build library
      run: cargo build --verbose
    - name: Build CLI
      run: cargo build --features cli --verbose
    - name: Run library tests
      run: cargo test --verbose
    - name: Run CLI tests
      run: cargo test --features cli --verbose
    - name: Run clippy
      run: cargo clippy --all-targets --features cli -- -D warnings
